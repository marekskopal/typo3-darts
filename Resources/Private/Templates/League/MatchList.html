<f:layout name="Default" />
<f:section name="main">
    <div class="match-list">
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th><f:translate key="matchlist.round" /></th>
                    <th><f:translate key="matchlist.date" /></th>
                    <th><f:translate key="matchlist.teams" /></th>
                    <th class="text-center"><f:translate key="matchlist.legs" /></th>
                    <th class="text-center"><f:translate key="matchlist.points" /></th>
                </tr>
            </thead>
            <tbody>
                <f:for each="{matches}" as="match" iteration="i">
                    <tr>
                        <td>{match.round}.</td>
                        <td><f:format.date format="j. n. Y">{match.matchDate}</f:format.date></td>
                        <td>{match.team1.title} : {match.team2.title}</td>
                        <td class="text-center"><f:if condition="{match.isPlayed}">{match.leg1}</f:if> : <f:if condition="{match.isPlayed}">{match.leg2}</f:if></td>
                        <td class="text-center"><f:if condition="{match.isPlayed}">{match.points1}</f:if> : <f:if condition="{match.isPlayed}">{match.points2}</f:if></td>
                    </tr>
                </f:for>
            </tbody>
        </table>
    </div>
</f:section>
