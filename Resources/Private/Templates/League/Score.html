<f:layout name="Default" />
<f:section name="main">
    <div class="score">
        <f:for each="{score}" as="group">
            <div class="score__group">
                <h2>{group.title}</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th></th>
                                <th><f:translate key="score.title" /></th>
                                <th><f:translate key="score.matches" /></th>
                                <th><f:translate key="score.win" /></th>
                                <th><f:translate key="score.win_ext" /></th>
                                <th><f:translate key="score.lose_ext" /></th>
                                <th><f:translate key="score.lose" /></th>
                                <th><f:translate key="score.legs" /></th>
                                <th><f:translate key="score.points" /></th>
                                <th><f:translate key="score.score" /></th>
                            </tr>
                        </thead>
                        <tbody>
                            <f:for each="{group.score}" as="row" iteration="i">
                                <tr data-team-id="{row.teamId}">
                                    <td>{i.cycle}</td>
                                    <td>{row.team.title}</td>
                                    <td>{row.matches}</td>
                                    <td>{row.win}</td>
                                    <td>{row.winExt}</td>
                                    <td>{row.loseExt}</td>
                                    <td>{row.lose}</td>
                                    <td>{row.legsOwn} : {row.legsOponent}</td>
                                    <td>{row.pointsOwn} : {row.pointsOponent}</td>
                                    <td>{row.score}</td>
                                </tr>
                            </f:for>
                        </tbody>
                    </table>
                </div>
            </div>
        </f:for>
    </div>
</f:section>
